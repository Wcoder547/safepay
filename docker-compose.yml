name: safepay
services:
  ml-api:
    build:
      context: ./ml-api
      dockerfile: Dockerfile
    container_name: safepay-ml
    env_file:
      - ./ml-api/.env
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5000/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - safepay-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safepay-backend
    env_file:
      - ./backend/.env.production
    environment:
      ML_API_URL: http://ml-api:5000
      NODE_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      ml-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - safepay-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: safepay-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - safepay-net
    restart: unless-stopped

networks:
  safepay-net:
    driver: bridge
