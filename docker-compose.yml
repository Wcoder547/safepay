name: safepay

services:
  postgres:
    image: postgres:16-alpine
    container_name: safepay-db
    environment:
      POSTGRES_DB: safepay
      POSTGRES_USER: safepay_user
      POSTGRES_PASSWORD: safepay_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepay_user -d safepay"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - safepay-net
    restart: unless-stopped

  ml-api:
    build:
      context: ./ml-api
      dockerfile: Dockerfile
    container_name: safepay-ml
    env_file:
      - ./ml-api/.env
    ports:
      - "5001:5001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5001/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - safepay-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safepay-backend
    env_file:
      - ./backend/.env )
    environment:
      DATABASE_URL: postgresql://safepay_user:safepay_pass@postgres:5432/safepay

      ML_API_URL: http://ml-api:5001
      NODE_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - safepay-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: safepay-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - safepay-net
    restart: unless-stopped

networks:
  safepay-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
